name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to Hostinger VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/frc-fashion/fashion-community-backend

            # Pull latest code (handles force pushes cleanly)
            git fetch origin main
            git reset --hard origin/main

            # Move compose file to parent directory and build/restart the backend
            cp docker-compose.yml ../docker-compose.yml
            cd /var/www/frc-fashion
            docker compose up -d --build frc-community-backend

            # Run DB migrations
            docker compose exec -T frc-community-backend \
              node_modules/.bin/prisma migrate deploy

            # Cleanup
            docker image prune -f
