services:

  # ==========================================
  # 1. Databases & Shared Infrastructure
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: shared_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frc_db
    volumes:
      # بنربط الداتا بمسار حقيقي وثابت على السيرفر
      - /opt/frc_data/postgres:/var/lib/postgresql/data
    networks:
      - frc_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shared_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - /opt/frc_data/redis:/data
    networks:
      - frc_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

 ## neo4j:
   ## image: neo4j:5-community
   # container_name: shared_neo4j
   # restart: unless-stopped
