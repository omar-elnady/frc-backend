   #   interval: 15s
   #   timeout: 10s
   #   retries: 5

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: shared_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - /opt/frc_data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - frc_network
    healthcheck:
      test: ['CMD-SHELL', 'curl -s -f http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5


  # ==========================================
  # 2. Fashion Community App (Backend) - (Frontend)
  # ==========================================
  frc-community-backend:
    build:
      context: ./fashion-community-backend
      dockerfile: Dockerfile
    container_name: fashion_community_backend
    restart: unless-stopped
    env_file:
      - ./fashion-community-backend/.env.production
    depends_on:
      - postgres
      - redis
      - neo4j
      - elasticsearch
    ports:
      - "4000:3000" 
    networks:
      - frc_network

  fashion-community-frontend:
    build:
      context: ./fashion-community-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.fashionretailclub.com
    container_name: fashion_community_frontend
    restart: unless-stopped
    env_file:
      - ./fashion-community-frontend/.env.production
    depends_on:
      - frc-community-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - frc_network


  # ==========================================
  # 3. Future Apps (LMS, Events) 
  # ==========================================
  # fashion-lms-backend:
  #   ...
  # fashion-events-frontend:
  #   ...


# إحنا مش هنحتاج الـ Volumes الوهمية بتاعة دوكر تاني، فهنمسحها ونعتمد بس على الهارد الحقيقي

networks:
  frc_network:
    driver: bridge









